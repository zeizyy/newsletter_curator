<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1280" viewBox="0 0 800 1280">
    <defs>
      <linearGradient id="heroGradient" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#dbe6f8" />
        <stop offset="100%" stop-color="#315c9d" />
      </linearGradient>
    </defs>
    <rect width="800" height="1280" fill="#f5f7fb"/>
    <text x="50" y="26" font-size="20" fill="#6c7687" font-family="Arial, Helvetica, sans-serif">Option D: Research Memo</text>
    <rect x="50" y="40" rx="18" ry="18" width="700" height="170" fill="#ffffff" stroke="#dbe6f8" stroke-width="2"/>
        <text x="80" y="92" font-size="18" fill="#6c7687">RESEARCH MEMO</text>
        <line x1="80" y1="104" x2="720" y2="104" stroke="#dbe6f8" stroke-width="2"/>
        <text x="80" y="160" font-size="54" font-weight="700" fill="#172133">Newsletter Digest</text>
    <text x="60" y="250" font-size="18" fill="#6c7687" font-family="Arial, Helvetica, sans-serif">Built for light + dark-safe contrast, email-safe layout, and web preview parity</text>

        <rect x="50" y="290" rx="14" ry="14" width="700" height="255" fill="#ffffff" stroke="#dbe6f8" stroke-width="1.5"/>
        <text x="70" y="322" font-size="15" fill="#315c9d">AI infra / cloud / Mar 21, 8:10 AM PT</text>
        <text x="70" y="364" font-size="30" font-weight="700" fill="#172133">Nvidia's quietly booming networking unit becomes a second engine</text>
        <circle cx="76" cy="377" r="4" fill="#315c9d" /><circle cx="76" cy="405" r="4" fill="#315c9d" /><circle cx="76" cy="433" r="4" fill="#315c9d" />
        <text x="92" y="382" font-size="18" fill="#172133">Revenue mix shifted from chips to bundled networking + optics.</text><text x="92" y="410" font-size="18" fill="#172133">Mellanox integration now looks like a margin expansion story.</text><text x="92" y="438" font-size="18" fill="#172133">Signals stronger AI data-center moat beyond GPU compute.</text>
        <text x="70" y="505" font-size="20" fill="#6c7687">Why this matters: Value capture is moving into the full AI rack, not just the accelerator.</text>
        <text x="70" y="530" font-size="18" font-weight="700" fill="#315c9d">Read article</text>


        <rect x="50" y="575" rx="14" ry="14" width="700" height="255" fill="#ffffff" stroke="#dbe6f8" stroke-width="1.5"/>
        <text x="70" y="607" font-size="15" fill="#315c9d">Search / distribution / Mar 21, 11:45 AM PT</text>
        <text x="70" y="649" font-size="30" font-weight="700" fill="#172133">Google's AI search UI hints at a ranking model reset</text>
        <circle cx="76" cy="662" r="4" fill="#315c9d" /><circle cx="76" cy="690" r="4" fill="#315c9d" /><circle cx="76" cy="718" r="4" fill="#315c9d" />
        <text x="92" y="667" font-size="18" fill="#172133">New answer surfaces compress publisher clickthrough patterns.</text><text x="92" y="695" font-size="18" fill="#172133">Retrieval and UI layout appear more tightly coupled.</text><text x="92" y="723" font-size="18" fill="#172133">Creates second-order effects for SEO, ads, and discovery.</text>
        <text x="70" y="790" font-size="20" fill="#6c7687">Why this matters: This changes who captures intent and where monetization lands.</text>
        <text x="70" y="815" font-size="18" font-weight="700" fill="#315c9d">Read article</text>


        <rect x="50" y="860" rx="14" ry="14" width="700" height="255" fill="#ffffff" stroke="#dbe6f8" stroke-width="1.5"/>
        <text x="70" y="892" font-size="15" fill="#315c9d">Agents / evals / Mar 21, 3:30 PM PT</text>
        <text x="70" y="934" font-size="30" font-weight="700" fill="#172133">A dense engineering post on agent eval loops beats generic benchmark news</text>
        <circle cx="76" cy="947" r="4" fill="#315c9d" /><circle cx="76" cy="975" r="4" fill="#315c9d" /><circle cx="76" cy="1003" r="4" fill="#315c9d" />
        <text x="92" y="952" font-size="18" fill="#172133">Shows concrete harness design instead of vague autonomous-agent claims.</text><text x="92" y="980" font-size="18" fill="#172133">Separates acceptance tests from exploratory evals.</text><text x="92" y="1008" font-size="18" fill="#172133">Makes agent reliability legible to engineering teams.</text>
        <text x="70" y="1075" font-size="20" fill="#6c7687">Why this matters: Reusable eval structure matters more than one-off leaderboard results.</text>
        <text x="70" y="1100" font-size="18" font-weight="700" fill="#315c9d">Read article</text>

    </svg>