            <text x="88" y="327" font-size="16" fill="#4fe3c1">AI infra / cloud</text>
            <text x="620" y="327" font-size="14" fill="#9badc3">Mar 21, 8:10 AM PT</text>
        <text x="70" y="364" font-size="30" font-weight="700" fill="#e6edf7">Nvidia's quietly booming networking unit becomes a second engine</text>
        <circle cx="76" cy="377" r="4" fill="#4fe3c1" /><circle cx="76" cy="405" r="4" fill="#4fe3c1" /><circle cx="76" cy="433" r="4" fill="#4fe3c1" />
        <text x="92" y="382" font-size="18" fill="#e6edf7">Revenue mix shifted from chips to bundled networking + optics.</text><text x="92" y="410" font-size="18" fill="#e6edf7">Mellanox integration now looks like a margin expansion story.</text><text x="92" y="438" font-size="18" fill="#e6edf7">Signals stronger AI data-center moat beyond GPU compute.</text>
        <text x="70" y="505" font-size="20" fill="#9badc3">Why this matters: Value capture is moving into the full AI rack, not just the accelerator.</text>
        <text x="70" y="530" font-size="18" font-weight="700" fill="#4fe3c1">Read article</text>


        <rect x="50" y="575" rx="14" ry="14" width="700" height="255" fill="#121824" stroke="#2d6cdf" stroke-width="1.5"/>
        <rect x="70" y="593" rx="12" ry="12" width="120" height="28" fill="#2d6cdf" opacity="0.18"/>
            <text x="88" y="612" font-size="16" fill="#4fe3c1">Search / distribution</text>
            <text x="620" y="612" font-size="14" fill="#9badc3">Mar 21, 11:45 AM PT</text>
        <text x="70" y="649" font-size="30" font-weight="700" fill="#e6edf7">Google's AI search UI hints at a ranking model reset</text>
        <circle cx="76" cy="662" r="4" fill="#4fe3c1" /><circle cx="76" cy="690" r="4" fill="#4fe3c1" /><circle cx="76" cy="718" r="4" fill="#4fe3c1" />
        <text x="92" y="667" font-size="18" fill="#e6edf7">New answer surfaces compress publisher clickthrough patterns.</text><text x="92" y="695" font-size="18" fill="#e6edf7">Retrieval and UI layout appear more tightly coupled.</text><text x="92" y="723" font-size="18" fill="#e6edf7">Creates second-order effects for SEO, ads, and discovery.</text>
        <text x="70" y="790" font-size="20" fill="#9badc3">Why this matters: This changes who captures intent and where monetization lands.</text>
        <text x="70" y="815" font-size="18" font-weight="700" fill="#4fe3c1">Read article</text>


