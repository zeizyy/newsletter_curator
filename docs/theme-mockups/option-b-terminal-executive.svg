        <rect x="70" y="878" rx="12" ry="12" width="120" height="28" fill="#2d6cdf" opacity="0.18"/>
            <text x="88" y="897" font-size="16" fill="#4fe3c1">Agents / evals</text>
            <text x="620" y="897" font-size="14" fill="#9badc3">Mar 21, 3:30 PM PT</text>
        <text x="70" y="934" font-size="30" font-weight="700" fill="#e6edf7">A dense engineering post on agent eval loops beats generic benchmark news</text>
        <circle cx="76" cy="947" r="4" fill="#4fe3c1" /><circle cx="76" cy="975" r="4" fill="#4fe3c1" /><circle cx="76" cy="1003" r="4" fill="#4fe3c1" />
        <text x="92" y="952" font-size="18" fill="#e6edf7">Shows concrete harness design instead of vague autonomous-agent claims.</text><text x="92" y="980" font-size="18" fill="#e6edf7">Separates acceptance tests from exploratory evals.</text><text x="92" y="1008" font-size="18" fill="#e6edf7">Makes agent reliability legible to engineering teams.</text>
        <text x="70" y="1075" font-size="20" fill="#9badc3">Why this matters: Reusable eval structure matters more than one-off leaderboard results.</text>
        <text x="70" y="1100" font-size="18" font-weight="700" fill="#4fe3c1">Read article</text>

