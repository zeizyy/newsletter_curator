    <text x="60" y="250" font-size="18" fill="#9badc3" font-family="Arial, Helvetica, sans-serif">Built for light + dark-safe contrast, email-safe layout, and web preview parity</text>

        <rect x="50" y="290" rx="14" ry="14" width="700" height="255" fill="#121824" stroke="#2d6cdf" stroke-width="1.5"/>
