        <text x="92" y="382" font-size="18" fill="#16202f">Revenue mix shifted from chips to bundled networking + optics.</text><text x="92" y="410" font-size="18" fill="#16202f">Mellanox integration now looks like a margin expansion story.</text><text x="92" y="438" font-size="18" fill="#16202f">Signals stronger AI data-center moat beyond GPU compute.</text>
        <text x="70" y="505" font-size="20" fill="#5d697a">Why this matters: Value capture is moving into the full AI rack, not just the accelerator.</text>
