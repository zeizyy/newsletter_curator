    <text x="60" y="250" font-size="18" fill="#6f7787" font-family="Arial, Helvetica, sans-serif">Built for light + dark-safe contrast, email-safe layout, and web preview parity</text>

        <rect x="50" y="290" rx="24" ry="24" width="700" height="255" fill="#ffffff" stroke="#f0c8a6" stroke-width="1.5"/>
