            <text x="106" y="328" font-size="16" fill="#6f7787">AI infra / cloud</text>
            <text x="600" y="328" font-size="14" fill="#6f7787">Mar 21, 8:10 AM PT</text>
        <text x="70" y="364" font-size="30" font-weight="700" fill="#1e2330">Nvidia's quietly booming networking unit becomes a second engine</text>
        <circle cx="76" cy="377" r="4" fill="#a33a2d" /><circle cx="76" cy="405" r="4" fill="#a33a2d" /><circle cx="76" cy="433" r="4" fill="#a33a2d" />
        <text x="92" y="382" font-size="18" fill="#1e2330">Revenue mix shifted from chips to bundled networking + optics.</text><text x="92" y="410" font-size="18" fill="#1e2330">Mellanox integration now looks like a margin expansion story.</text><text x="92" y="438" font-size="18" fill="#1e2330">Signals stronger AI data-center moat beyond GPU compute.</text>
        <text x="70" y="505" font-size="20" fill="#6f7787">Why this matters: Value capture is moving into the full AI rack, not just the accelerator.</text>
        <text x="70" y="530" font-size="18" font-weight="700" fill="#a33a2d">Read article</text>


        <rect x="50" y="575" rx="24" ry="24" width="700" height="255" fill="#ffffff" stroke="#f0c8a6" stroke-width="1.5"/>
        <circle cx="88" cy="607" r="8" fill="#a33a2d" />
            <text x="106" y="613" font-size="16" fill="#6f7787">Search / distribution</text>
            <text x="600" y="613" font-size="14" fill="#6f7787">Mar 21, 11:45 AM PT</text>
        <text x="70" y="649" font-size="30" font-weight="700" fill="#1e2330">Google's AI search UI hints at a ranking model reset</text>
        <circle cx="76" cy="662" r="4" fill="#a33a2d" /><circle cx="76" cy="690" r="4" fill="#a33a2d" /><circle cx="76" cy="718" r="4" fill="#a33a2d" />
        <text x="92" y="667" font-size="18" fill="#1e2330">New answer surfaces compress publisher clickthrough patterns.</text><text x="92" y="695" font-size="18" fill="#1e2330">Retrieval and UI layout appear more tightly coupled.</text><text x="92" y="723" font-size="18" fill="#1e2330">Creates second-order effects for SEO, ads, and discovery.</text>
        <text x="70" y="790" font-size="20" fill="#6f7787">Why this matters: This changes who captures intent and where monetization lands.</text>
        <text x="70" y="815" font-size="18" font-weight="700" fill="#a33a2d">Read article</text>


        <rect x="50" y="860" rx="24" ry="24" width="700" height="255" fill="#ffffff" stroke="#f0c8a6" stroke-width="1.5"/>
        <circle cx="88" cy="892" r="8" fill="#a33a2d" />
            <text x="106" y="898" font-size="16" fill="#6f7787">Agents / evals</text>
            <text x="600" y="898" font-size="14" fill="#6f7787">Mar 21, 3:30 PM PT</text>
        <text x="70" y="934" font-size="30" font-weight="700" fill="#1e2330">A dense engineering post on agent eval loops beats generic benchmark news</text>
        <circle cx="76" cy="947" r="4" fill="#a33a2d" /><circle cx="76" cy="975" r="4" fill="#a33a2d" /><circle cx="76" cy="1003" r="4" fill="#a33a2d" />
        <text x="92" y="952" font-size="18" fill="#1e2330">Shows concrete harness design instead of vague autonomous-agent claims.</text><text x="92" y="980" font-size="18" fill="#1e2330">Separates acceptance tests from exploratory evals.</text><text x="92" y="1008" font-size="18" fill="#1e2330">Makes agent reliability legible to engineering teams.</text>
        <text x="70" y="1075" font-size="20" fill="#6f7787">Why this matters: Reusable eval structure matters more than one-off leaderboard results.</text>
        <text x="70" y="1100" font-size="18" font-weight="700" fill="#a33a2d">Read article</text>

