<html>
<head>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <meta name="supported-color-schemes" content="light dark" />
  <style>
    body { margin: 0; padding: 0; background: #f4f7fb; font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    .email-shell { max-width: 760px; margin: 0 auto; padding: 28px 16px; }
    .footer { font-size: 12px; color: #73859f; margin-top: 8px; }

    @media (max-width: 600px) {
      .email-shell { padding: 16px 10px !important; }
      .hero { padding: 16px 14px !important; border-radius: 12px !important; }
      .hero-kicker { font-size: 12px !important; }
      .hero-title { font-size: 26px !important; }
      .category-title { font-size: 19px !important; }
      .story-card { padding: 13px !important; border-radius: 10px !important; }
      .story-title { font-size: 18px !important; }
      .story-body,
      .summary-paragraph,
      .summary-list,
      .summary-list-item { font-size: 14px !important; line-height: 1.5 !important; }
      .summary-heading { font-size: 14px !important; }
    }

    @media (prefers-color-scheme: dark) {
      body { background: #0b1220 !important; color: #d9e2f2 !important; }
      .story-card { background: #141e2f !important; border-color: #2a3a54 !important; }
      .story-title,
      .category-title,
      .summary-heading { color: #eff4ff !important; }
      .story-body,
      .summary-paragraph,
      .summary-list,
      .summary-list-item,
      .footer { color: #b6c4dd !important; }
      .story-link { color: #8bb4ff !important; }
    }
  </style>
</head>
<body style="margin:0;padding:0;background:#f4f7fb;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;">
  <div class="email-shell" style="max-width:760px;margin:0 auto;padding:28px 16px;">
    <div class="hero" style="background:linear-gradient(135deg,#0f2748,#1c4d8c);border-radius:14px;padding:20px 22px;color:#ffffff;margin:0 0 18px 0;">
      <div class="hero-kicker" style="font-size:13px;letter-spacing:0.08em;text-transform:uppercase;opacity:0.9;">Daily Briefing</div>
      <div class="hero-title" style="font-size:32px;font-weight:750;line-height:1.2;margin:6px 0 0 0;">Newsletter Digest</div>
    </div>
    {{CATEGORY_SECTIONS}}
    <div class="footer" style="font-size:12px;color:#73859f;margin-top:8px;">Generated by Newsletter Curator</div>
  </div>
</body>
</html>
