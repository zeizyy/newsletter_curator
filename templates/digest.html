<html>
<head>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <meta name="supported-color-schemes" content="light dark" />
  <style>
    body {
      margin: 0;
      padding: 0;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.86), transparent 26%),
        radial-gradient(circle at top right, rgba(103,211,172,0.18), transparent 28%),
        linear-gradient(180deg,#eef4f3,#dde9e6);
      color: #16222f;
      font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
    }
    .email-shell { max-width: 820px; margin: 0 auto; padding: 28px 16px; }
    .email-frame { background: rgba(255,255,255,0.86); border: 1px solid rgba(19,91,72,0.18); border-radius: 34px; padding: 18px; box-shadow: 0 22px 56px rgba(17,27,45,0.14); }
    .email-canvas { background: #ffffff; border: 1px solid rgba(19,91,72,0.18); border-radius: 28px; overflow: hidden; }
    .hero {
      background:
        linear-gradient(135deg,rgba(255,255,255,0.08),transparent 45%),
        linear-gradient(135deg,#0e3f35,#0f8661 72%,#18a57b);
      color: #f3fffb;
      padding: 30px;
    }
    .hero-grid { display: grid; grid-template-columns: 1fr; gap: 18px; align-items: end; }
    .hero-title { margin: 0; max-width: 11ch; font-family: Georgia, "Times New Roman", Times, serif; font-size: 56px; line-height: 0.94; letter-spacing: -0.05em; }
    .hero-copy { margin: 14px 0 0; max-width: 36rem; color: rgba(243,255,251,0.82); font-size: 16px; line-height: 1.65; }
    .stories-wrap { padding: 22px 18px 8px; background: linear-gradient(180deg,rgba(255,255,255,0.44),rgba(255,255,255,0)); }
    .footer { font-size: 12px; color: #6f7f87; margin-top: 10px; }

    @media (max-width: 600px) {
      .email-shell { padding: 16px 10px !important; }
      .email-frame { padding: 10px !important; border-radius: 24px !important; }
      .hero { padding: 22px 20px 20px !important; }
      .hero-grid { grid-template-columns: 1fr !important; }
      .hero-title { font-size: 40px !important; }
      .hero-copy { font-size: 15px !important; }
      .stories-wrap { padding: 12px !important; }
      .story-card { padding: 18px !important; border-radius: 18px !important; }
      .story-title { font-size: 28px !important; max-width: none !important; }
      .story-body,
      .summary-paragraph,
      .summary-list,
      .summary-list-item,
      .story-time,
      .story-source,
      .story-chip { font-size: 13px !important; line-height: 1.55 !important; }
    }

    @media (prefers-color-scheme: dark) {
      body, .body-shell { background: #13161c !important; color: #edf1f7 !important; }
      .email-frame { background: rgba(19,24,31,0.92) !important; border-color: rgba(175,188,206,0.14) !important; }
      .email-canvas { background: #1b212a !important; border-color: rgba(175,188,206,0.14) !important; }
      .story-card { background: #1d2430 !important; border-color: rgba(175,188,206,0.14) !important; }
      .story-title, .category-title, .summary-heading { color: #edf1f7 !important; }
      .story-body, .summary-paragraph, .summary-list, .summary-list-item, .footer { color: #c5cfdd !important; }
      .summary-note { background: #17362f !important; border-color: rgba(103,211,172,0.18) !important; }
      .summary-note-copy { color: #d9f2ea !important; }
      .story-time, .story-source { background: rgba(255,255,255,0.07) !important; color: #b2c7c0 !important; }
      .story-chip { background: rgba(103,211,172,0.16) !important; color: #67d3ac !important; }
      .story-link { color: #7be0bc !important; }
    }

    [data-ogsc] body,
    [data-ogsc] .body-shell { background: #13161c !important; color: #edf1f7 !important; }
    [data-ogsc] .email-frame { background: rgba(19,24,31,0.92) !important; border-color: rgba(175,188,206,0.14) !important; }
    [data-ogsc] .email-canvas,
    [data-ogsc] .story-card { background: #1b212a !important; border-color: rgba(175,188,206,0.14) !important; }
    [data-ogsc] .story-title,
    [data-ogsc] .category-title,
    [data-ogsc] .summary-heading { color: #edf1f7 !important; }
    [data-ogsc] .story-body,
    [data-ogsc] .summary-paragraph,
    [data-ogsc] .summary-list,
    [data-ogsc] .summary-list-item,
    [data-ogsc] .footer { color: #c5cfdd !important; }
    [data-ogsc] .summary-note { background: #17362f !important; border-color: rgba(103,211,172,0.18) !important; }
    [data-ogsc] .summary-note-copy { color: #d9f2ea !important; }
    [data-ogsc] .story-time,
    [data-ogsc] .story-source { background: rgba(255,255,255,0.07) !important; color: #b2c7c0 !important; }
    [data-ogsc] .story-chip { background: rgba(103,211,172,0.16) !important; color: #67d3ac !important; }
    [data-ogsc] .story-link { color: #7be0bc !important; }
  </style>
</head>
<body class="body-shell" style="margin:0;padding:0;background:#eef4f3;color:#16222f;font-family:'Trebuchet MS','Segoe UI',Arial,sans-serif;">
  <div class="email-shell" style="max-width:820px;margin:0 auto;padding:28px 16px;">
    <div class="email-frame" style="background:rgba(255,255,255,0.86);border:1px solid rgba(19,91,72,0.18);border-radius:34px;padding:18px;box-shadow:0 22px 56px rgba(17,27,45,0.14);">
      <div class="email-canvas" style="background:#ffffff;border:1px solid rgba(19,91,72,0.18);border-radius:28px;overflow:hidden;">
        <div class="hero" style="background:linear-gradient(135deg,#0e3f35,#0f8661 72%,#18a57b);color:#f3fffb;padding:30px;">
          <div class="hero-grid" style="display:grid;grid-template-columns:1fr;gap:18px;align-items:end;">
            <div>
              <div class="hero-title" style="margin:0;max-width:11ch;font-family:Georgia,'Times New Roman',Times,serif;font-size:56px;line-height:0.94;letter-spacing:-0.05em;">AI Signal Daily</div>
              <div class="hero-copy" style="margin:14px 0 0;max-width:36rem;color:rgba(243,255,251,0.82);font-size:16px;line-height:1.65;">The highest-signal stories for today, pre-ranked and condensed for fast scanning.</div>
            </div>
          </div>
        </div>
        <div class="stories-wrap" style="padding:22px 18px 8px;background:linear-gradient(180deg,rgba(255,255,255,0.44),rgba(255,255,255,0));">
          {{CATEGORY_SECTIONS}}
        </div>
      </div>
    </div>
    <div class="footer" style="font-size:12px;color:#6f7f87;margin-top:10px;">AI Signal Daily</div>
  </div>
</body>
</html>
