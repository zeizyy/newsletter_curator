<html>
<head>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <meta name="supported-color-schemes" content="light dark" />
  <style>
    body { margin: 0; padding: 0; background: #edf3f8; font-family: Georgia, "Iowan Old Style", "Palatino Linotype", serif; }
    .email-shell { max-width: 760px; margin: 0 auto; padding: 32px 16px; }
    .footer { font-size: 12px; color: #73859f; margin-top: 14px; }

    @media (max-width: 600px) {
      .email-shell { padding: 14px 8px !important; }
      .hero { padding: 18px 16px !important; border-radius: 18px !important; }
      .hero-kicker { font-size: 12px !important; }
      .hero-title { font-size: 28px !important; }
      .hero-subtitle { font-size: 14px !important; }
      .category-title { font-size: 22px !important; }
      .story-card { padding: 16px !important; border-radius: 14px !important; }
      .story-title { font-size: 20px !important; }
      .story-body,
      .summary-paragraph,
      .summary-list,
      .summary-list-item { font-size: 14px !important; line-height: 1.6 !important; }
      .summary-heading { font-size: 14px !important; }
    }

    @media (prefers-color-scheme: dark) {
      body { background: #0b1220 !important; color: #d9e2f2 !important; }
      .story-card { background: #141e2f !important; border-color: #2a3a54 !important; box-shadow: none !important; }
      .story-title,
      .category-title,
      .summary-heading,
      .hero-title { color: #eff4ff !important; }
      .hero-subtitle,
      .hero-kicker,
      .category-kicker { color: #b6c4dd !important; }
      .story-body,
      .summary-paragraph,
      .summary-list,
      .summary-list-item,
      .footer { color: #b6c4dd !important; }
      .story-link { color: #8bb4ff !important; }
      .story-source-pill { background: #18263d !important; border-color: #2a3a54 !important; color: #cfe0fb !important; }
      .story-date-pill { background: #30271b !important; border-color: #574627 !important; color: #f3d38a !important; }
      .hero { background: linear-gradient(135deg,#15294a,#295d9e) !important; }
    }
  </style>
</head>
<body style="margin:0;padding:0;background:#edf3f8;font-family:Georgia,'Iowan Old Style','Palatino Linotype',serif;">
  <div class="email-shell" style="max-width:760px;margin:0 auto;padding:32px 16px;">
    <div class="hero" style="background:linear-gradient(135deg,#0f2748,#1f5aa3);border-radius:22px;padding:24px 24px 22px 24px;color:#ffffff;margin:0 0 22px 0;box-shadow:0 18px 48px rgba(17,44,84,0.18);">
      <div class="hero-kicker" style="font-size:12px;letter-spacing:0.14em;text-transform:uppercase;opacity:0.9;font-weight:700;">Daily Briefing</div>
      <div class="hero-title" style="font-size:36px;font-weight:760;line-height:1.12;margin:8px 0 8px 0;">Newsletter Digest</div>
      <div class="hero-subtitle" style="font-size:15px;line-height:1.55;max-width:560px;color:rgba(255,255,255,0.86);">
        The highest-signal stories for today, pre-ranked and condensed for fast scanning.
      </div>
      <div class="hero-stats" style="margin-top:14px;font-size:13px;font-weight:700;color:rgba(255,255,255,0.82);">
        {{STORY_COUNT}} stories selected
      </div>
    </div>
    {{CATEGORY_SECTIONS}}
    <div class="footer" style="font-size:12px;color:#73859f;margin-top:14px;">Generated by Newsletter Curator</div>
  </div>
</body>
</html>
