<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Newsletter Digest</title>
</head>
<body style="margin:0;padding:0;background:#eef4f3;color:#16222f;font-family:'Trebuchet MS','Segoe UI',Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#eef4f3;border-collapse:collapse;">
    <tr>
      <td align="center" style="padding:8px 0;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:640px;background:#ffffff;border:1px solid #d5dde8;border-collapse:collapse;">
          <tr>
            <td style="padding:18px 18px 16px 18px;border-bottom:1px solid #dfe6ef;background:linear-gradient(135deg,#0e3f35,#0f8661 72%,#18a57b);">
              <div style="margin:0 0 10px 0;font-size:12px;line-height:1.4;color:rgba(243,255,251,0.72);font-weight:700;text-transform:uppercase;letter-spacing:0.14em;">Operator Edition</div>
              <div style="display:inline-block;margin:0 0 10px 0;padding:6px 10px;border-radius:999px;background:rgba(255,255,255,0.12);font-size:11px;line-height:1.3;color:#f3fffb;font-weight:700;text-transform:uppercase;letter-spacing:0.14em;">Daily Briefing</div>
              <div style="margin:0;font-size:38px;line-height:0.96;font-weight:700;color:#f3fffb;font-family:Georgia,'Times New Roman',Times,serif;">Newsletter Digest</div>
              <div style="margin:12px 0 0 0;font-size:15px;line-height:1.6;color:rgba(243,255,251,0.82);">The highest-signal stories for today, pre-ranked and condensed for fast scanning.</div>
              <div style="margin:14px 0 0 0;padding:10px 12px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.12);font-size:13px;line-height:1.55;color:#f3fffb;"><strong>{{HERO_COUNT}} stories selected</strong> for a faster operator-style scan.</div>
            </td>
          </tr>
          <tr>
            <td style="padding:12px 12px 4px 12px;background:#f8fbff;">
              {{CATEGORY_SECTIONS}}
            </td>
          </tr>
        </table>
        <div style="max-width:640px;margin-top:6px;font-size:12px;line-height:1.5;color:#6f7f87;text-align:left;">Generated by Newsletter Curator</div>
      </td>
    </tr>
  </table>
</body>
</html>
