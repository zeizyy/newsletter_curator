gmail:
  label: Newsletters
  query_time_window: newer_than:1d

paths:
  credentials: secrets/credentials.json
  token: secrets/token.json

database:
  path: data/newsletter_curator.sqlite3
  ttl_days: 7
  newsletter_ttl_days: 7
  allow_schema_reset: false

development:
  use_canned_sources: false
  canned_sources_file: tests/fixtures/canned_sources.json
  fake_inference: false

persona:
  text: |
    Rank highest: stories about AI value capture, Google/big-tech strategy, meaningful AI/ML technical developments, dense engineering blogs, and surprising datapoints.

    I care most about:
    - AI infra winners, big-tech capex/monetization, tech-relevant macro
    - Google strategy in Search/Discover/AI Mode/Workspace
    - OpenAI/Anthropic/Microsoft/Meta/Apple/Amazon when the story reveals real platform direction
    - architecture, inference, retrieval/ranking, agents, RL/post-training, evals, hardware economics
    - concrete metrics that reveal adoption, costs, margins, or hidden shifts

    Why it matters to me:
    Tie each story to strategy, technical mechanism, adoption, economics, AI-stack value capture, or implications for ranking/retrieval/agent systems.

    Prefer:
    real strategy, concrete numbers, under-the-hood insight, adoption/monetization signal, reusable playbooks, anomalies

    Avoid:
    PR fluff, hype, generic macro, repetitive benchmark news, shallow summaries

additional_sources:
  enabled: true
  script_path: skills/daily-news-curator/scripts/build_daily_digest.py
  feeds_file: ""
  hours: 24
  top_per_category: 5
  max_total: 30

openai:
  reasoning_model: gpt-5-mini
  summary_model: gpt-5-mini

limits:
  max_links_per_email: 15
  select_top_stories: 20
  max_per_category: 3
  final_top_stories: 15
  source_quotas:
    gmail: 10
    additional_source: 5
  max_article_chars: 6000
  max_gmail_fetch_after_score: 25
  max_gmail_message_workers: 1
  max_summary_workers: 5
  max_ingest_summaries: 25

email:
  digest_recipients: []
  digest_subject: AI Signal Daily
  weekly_digest_subject: AI Signal Weekly
  alert_recipient: zeizyy@gmail.com
  alert_subject_prefix: "[ALERT] Newsletter Curator Failure"

weekly:
  max_stories_per_day: 5

tracking:
  enabled: true
  open_enabled: true
  click_enabled: true
